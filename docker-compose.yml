services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-m2_valres}
      DB_USER: ${DB_USER:-valres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "80"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:10.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootchangeme}
      MARIADB_DATABASE: ${DB_NAME:-m2_valres}
      MARIADB_USER: ${DB_USER:-valres}
      MARIADB_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/mysql
      # Import automatique du schéma au premier démarrage
      - ./Docs/m2_valres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data: